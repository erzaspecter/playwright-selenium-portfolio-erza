# ============================================
# MODENA ENERGY - AUTOMATION CONFIGURATION
# ============================================

# Application URLs
base.url=https://energy.modena.com/id_en
base.url.api=https://energy.modena.com/api

# Browser Configuration
default.browser=chrome
headless.mode=false

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Path Configuration
screenshot.path=reports/screenshots/
report.path=reports/extent-reports/
download.path=downloads/
testdata.path=src/main/resources/testdata/

# Test Data Files
consultation.excel.data=src/main/resources/testdata/consultation_data.xlsx
calculator.json.data=src/main/resources/testdata/calculator_data.json

# Email Configuration
email.enabled=false
email.host=smtp.gmail.com
email.port=587
email.username=your-email@gmail.com
email.password=your-password
email.recipient=test-reports@modena.com

# API Configuration
api.timeout=30
api.retry.count=3