name: CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push Docker image
  docker-build:
    runs-on: ubuntu-latest
    needs: [ci-success]  # Pastikan CI berhasil
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
  # Deploy to Kubernetes
  deploy-k8s:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
          
      - name: Set up Kubernetes config
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          
      - name: Deploy to Kubernetes
        run: |
          # Update image tag in deployment
          sed -i "s|image:.*|image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/deployment.yaml
          
          # Apply manifests
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/modena-app -n production
          
      - name: Verify deployment
        run: |
          kubectl get pods -n production
          kubectl get svc -n production
          
  # Post-deployment smoke tests
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-k8s
    steps:
      - uses: actions/checkout@v4
      
      - name: Run smoke tests
        run: |
          cd tests
          npm ci
          PLAYWRIGHT_BASE_URL="https://modena-prod.example.com" npx playwright test smoke.spec.ts
          
      - name: Notify on success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"text":"✅ Deployment successful! https://modena-prod.example.com"}' \
            ${{ secrets.SLACK_WEBHOOK }}