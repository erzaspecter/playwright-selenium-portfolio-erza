name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/14-fullstack-webapp-ci-cd/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/14-fullstack-webapp-ci-cd/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: frontend-ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: projects/14-fullstack-webapp-ci-cd/frontend
        run: npm ci

      - name: Install test dependencies
        working-directory: projects/14-fullstack-webapp-ci-cd/tests
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: projects/14-fullstack-webapp-ci-cd/tests
        run: npx playwright install --with-deps chromium

      - name: Start frontend server
        working-directory: projects/14-fullstack-webapp-ci-cd/frontend
        run: npm run dev &

      - name: Wait for frontend
        run: npx wait-on http://localhost:3000

      - name: Run Playwright tests
        working-directory: projects/14-fullstack-webapp-ci-cd/tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: projects/14-fullstack-webapp-ci-cd/tests/playwright-report/